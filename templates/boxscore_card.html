<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin:0; padding:0; background:transparent; }
  body {
    display:inline-block;
    font-family: Georgia, "Times New Roman", Times, serif;
    line-height: 1.02;
  }

  #card {
    display:inline-block;
    width: 860px;
    margin: 0;
    padding: 5px 7px 6px;
    background: #fff;
    color: #000;
  }

  .kicker {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .title {
    margin: 1px 0 0 0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -.01em;
  }
  .score {
    margin: 1px 0 0 0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.0;
  }
  .meta, .rhe { font-size: 11px; margin: 1px 0 0 0; }
  .rule { border-top: 1px solid #000; margin: 3px 0 2px 0; }

  .section { margin-top: 3px; }
  .section h3 {
    margin: 0 0 1px 0;
    font-size: 11px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    letter-spacing: .02em;
    text-transform: uppercase;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
    padding: 1px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    border-top: 0;
    border-bottom: 1px solid #000;
    font-variant-numeric: tabular-nums;
  }

  thead th {
    padding: 0 2px 1px;
    border-right: 0;
    border-bottom: 1px solid #000;
    text-align: right;
    font-size: 10px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  thead th:first-child { text-align: left; }
  thead th:last-child { border-right: 0; }

  tbody td {
    padding: 0 2px;
    border-top: 1px solid #ececec;
    border-right: 0;
    text-align: right;
    font-size: 10.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td:last-child { border-right: 0; }
  tbody td.player { text-align: left; font-size: 11px; }
  tbody td.num { text-align: right; font-size: 10.5px; }
  tbody td.season { text-align: right; font-size: 10px; color: #333; }

  tbody tr.sub td { color:#555; }
  .name-wrap { display: inline-block; }
  .name-wrap.indent { padding-left: 8px; }

  .hcell .h { font-size: 10.5px; font-weight: 700; }
  .hcell .xbh {
    font-size: 9px;
    color: #444;
    margin-left: 2px;
    white-space: nowrap;
  }

  .season .lite { font-size: 9px; color: #666; margin-left: 2px; }

  .hl { position: relative; z-index: 0; }
  .hl::before {
    content: "";
    position: absolute;
    left: -1px;
    right: -1px;
    top: 58%;
    height: 0.82em;
    background: rgba(255,235,59,0.45);
    transform: rotate(-.8deg);
    border-radius: 2px;
    z-index: -1;
  }

  .moments { margin-top: 3px; }
  .moments h3 {
    margin: 0 0 1px 0;
    font-size: 11px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
    padding: 1px 0;
  }
  .moments ol {
    margin: 0;
    padding: 0;
    list-style: none;
    font-size: 10.5px;
    line-height: 1.14;
  }
  .moments li {
    margin: 0;
    padding: 1px 0;
    border-bottom: 1px dotted #b7b7b7;
  }
  .moments li:last-child { border-bottom: 0; }
</style>
</head>
<body>
<div id="card">
  <div class="kicker">DSL Giants Orange Box Score</div>
  <div class="title">__MATCHUP__</div>
  <div class="score">__SCORE_LINE__</div>
  <div class="meta">__DATE_STATUS__</div>
  <div class="rhe">__RH_E__</div>
  <div class="rule"></div>

  <div class="section">
    <h3>Batting</h3>
    <table>
      <thead>
      <tr>
        <th style="width:30%">Batter</th>
        <th style="width:5%">PA</th><th style="width:5%">AB</th><th style="width:5%">R</th><th style="width:14%">H/XBH</th>
        <th style="width:5%">BB</th><th style="width:5%">SO</th><th style="width:5%">SB</th><th style="width:26%">Season</th>
      </tr>
      </thead>
      <tbody>
      __HITTER_ROWS__
      </tbody>
    </table>
  </div>

  <div class="section">
    <h3>Pitching</h3>
    <table>
      <thead>
      <tr>
        <th style="width:24%">Pitcher</th><th style="width:5%">IP</th><th style="width:4%">H</th><th style="width:4%">R</th><th style="width:4%">ER</th>
        <th style="width:4%">BB</th><th style="width:4%">SO</th><th style="width:5%">BF</th><th style="width:6%">SwStr</th><th style="width:4%">GB</th>
        <th style="width:36%">Season</th>
      </tr>
      </thead>
      <tbody>
      __PITCHER_ROWS__
      </tbody>
    </table>
  </div>

  <div class="moments">
    <h3>Key moments (WPA)</h3>
    <ol>__MOMENT_ROWS__</ol>
  </div>
</div>
</body>
</html>
