<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: #000;
    font-family: "Times New Roman", Georgia, serif;
  }

  #card {
    width: 840px;
    padding: 6px 8px 7px;
    box-sizing: border-box;
    background: #fff;
    line-height: 1.05;
  }

  .kicker {
    margin: 0;
    font: 700 10px/1 Arial, Helvetica, sans-serif;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .scoreline {
    margin: 2px 0 0;
    font: 700 17px/1.02 Arial, Helvetica, sans-serif;
    letter-spacing: -.01em;
  }

  .matchup, .meta, .rhe {
    margin: 1px 0 0;
    font-size: 10.5px;
  }

  .rule {
    border-top: 1px solid #000;
    margin: 3px 0;
  }

  .section-label {
    margin: 0 0 1px;
    padding: 1px 0;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
    font: 700 10px/1 Arial, Helvetica, sans-serif;
    letter-spacing: .06em;
    text-transform: uppercase;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
    padding: 1px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-variant-numeric: tabular-nums;
    border-bottom: 1px solid #000;
    margin: 0 0 2px;
  }

  thead th {
    padding: 0 2px 1px;
    border-bottom: 1px solid #000;
    font: 700 9px/1 Arial, Helvetica, sans-serif;
    text-align: right;
    white-space: nowrap;
  }

  thead th:first-child,
  tbody td.player { text-align: left; }

  tbody td {
    padding: 0 2px;
    border-top: 1px solid #ececec;
    font-size: 10px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  td.player { font-size: 10.5px; }
  td.season { color: #222; font-size: 9.6px; }
  tr.sub td { color: #555; }
  .name-wrap.indent { padding-left: 7px; display: inline-block; }

  .hcell .h { font-weight: 700; }
  .hcell .xbh { font-size: 9px; color: #444; margin-left: 2px; }
  .season .lite { color: #555; font-size: 8.7px; margin-left: 2px; }

  .hl {
    background: linear-gradient(transparent 56%, rgba(255, 235, 59, 0.45) 56%);
    padding: 0 1px;
  }

  .moments {
    margin: 0;
    padding: 0;
    list-style: none;
    font-size: 10px;
  }

  .moments li {
    margin: 0;
    padding: 1px 0;
    border-bottom: 1px dotted #b7b7b7;
  }

  .moments li:last-child { border-bottom: 0; }
</style>
</head>
<body>
<div id="card">
  <p class="kicker">DSL Giants Orange Box Score</p>
  <p class="scoreline">__SCORE_LINE__</p>
  <p class="matchup">__MATCHUP__</p>
  <p class="meta">__DATE_STATUS__</p>
  <p class="rhe">__RH_E__</p>
  <div class="rule"></div>

  <h3 class="section-label">Batting</h3>
  <table>
    <thead>
      <tr>
        <th style="width:30%">Batter</th>
        <th style="width:5%">PA</th><th style="width:5%">AB</th><th style="width:5%">R</th><th style="width:14%">H/XBH</th>
        <th style="width:5%">BB</th><th style="width:5%">SO</th><th style="width:5%">SB</th><th style="width:26%">Season</th>
      </tr>
    </thead>
    <tbody>
      __HITTER_ROWS__
    </tbody>
  </table>

  <h3 class="section-label">Pitching</h3>
  <table>
    <thead>
      <tr>
        <th style="width:24%">Pitcher</th><th style="width:5%">IP</th><th style="width:4%">H</th><th style="width:4%">R</th><th style="width:4%">ER</th>
        <th style="width:4%">BB</th><th style="width:4%">SO</th><th style="width:5%">BF</th><th style="width:6%">SwStr</th><th style="width:4%">GB</th>
        <th style="width:36%">Season</th>
      </tr>
    </thead>
    <tbody>
      __PITCHER_ROWS__
    </tbody>
  </table>

  <h3 class="section-label">Key Moments (WPA)</h3>
  <ol class="moments">__MOMENT_ROWS__</ol>
</div>
</body>
</html>
